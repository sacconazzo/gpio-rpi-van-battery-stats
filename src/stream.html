<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Stream</title>
</head>
<body>
  <img id="video" src="#" alt="Video Stream">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.0.3/socket.io.js"></script>
<script>
    const socket = io.connect('ws://localhost:3000');

    // Evento per gestire la connessione
    socket.on('connect', () => {
        console.log('Connessione stabilita con successo!');
    });

    const video = document.getElementById('video');
    socket.on('image', (data) => {
      video.src = 'data:image/jpeg;base64,' + btoa(new Uint8Array(data).reduce((data, byte) => data + String.fromCharCode(byte), ''));
    });
  </script>
</body>
</html>
